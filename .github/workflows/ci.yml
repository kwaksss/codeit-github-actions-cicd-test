name: CI Workflow   #현재 워크플로우의 이름

on:   #워크 플로우 실행 조건
  push:
    branches: ["main"]    #main브랜치에 push가 발생하면 workflow 실행

jobs:   #실행할 작업(job) 정의
  build:    #build라는 작업 설정
    runs-on: ubuntu-latest    #실행환경 설정(build라는 job이 이 환경에서 실행됨)

    steps:    #job안에서 실행될 단계
      - uses: actions/checkout@v3   #현재 repository에 있는 소스코드를 checkout(가지고 온다.)

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드 및 테스트
        run: ./gradlew clean build    #build안에서 Test 이루어지고, jar 파일이 만들어진다.

      - name: Docker Build
        run: |    #.은 현재 위치의 docker 파일을 가지고 build
          docker build -t myapp.latest .

      -  name: Docker Build 및 커밋 해시태그 설정
         run: |
           IMAGE_TAG=${GITHUB_SHA::7}
           docker built -t myapp:$IMAGE_TAG .